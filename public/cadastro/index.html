<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newsletter — Up Dance</title>
<link rel="icon" type="image/x-icon" href="/images/icons/udx-icon.ico">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:ital@1&display=swap">
<style>
  :root{--bg:#020118;--card:#0c0b22;--line:#221f3e;--txt:#DFE0F2;--muted:#8a86b0;--accent:#BF0449;--grad:linear-gradient(to right,#F434A1,#ff8442)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Poppins',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:2rem 1.2rem}
  .card{width:min(94vw,440px);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:2.4rem 2rem;text-align:center}
  .logo{width:54px;height:54px;border-radius:25%}
  h1{margin:1rem 0 .3rem;font-size:1.5rem;font-weight:700;color:#fff}
  h1 span{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
    background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .intro{color:var(--muted);line-height:1.55;font-size:.92rem;margin:0 0 1.6rem}
  label{display:block;font-size:.76rem;color:var(--muted);margin:.2rem 0 .35rem;text-align:left}
  .opc{font-size:.7rem}
  .campo{width:100%;padding:.8rem .9rem;border-radius:9px;border:1px solid #2f2c52;background:var(--bg);
    color:#fff;font-size:.95rem;margin-bottom:.8rem;font-family:'Poppins',sans-serif}
  .campo:focus{outline:none;border-color:var(--accent)}.campo::placeholder{color:#6f6c94}
  .btn{width:100%;padding:.85rem;border-radius:9px;border:0;cursor:pointer;background:var(--accent);
    color:#fff;font-weight:600;font-size:.98rem;font-family:'Poppins',sans-serif;transition:background-image .25s}
  .btn:hover{background-image:var(--grad)}.btn:disabled{opacity:.6;background-image:none}
  .msg{margin-top:1rem;font-size:.88rem;min-height:1.1em;line-height:1.45}.msg.ok{color:#5fe0a4}.msg.err{color:#ff7591}
  .voltar{display:inline-block;margin-top:1.6rem;color:var(--muted);font-size:.85rem;text-decoration:none}
  .lgpd{margin-top:1.2rem;font-size:.74rem;color:#6f6c94;line-height:1.5}
  @media(max-width:420px){.card{padding:1.8rem 1.2rem}}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/images/icons/udx-icon.png" alt="Up Dance">
    <h1>Cadastre-se na <span>Up Dance</span></h1>
    <p class="intro" id="intro">Receba nossas matérias exclusivas. Enviaremos um e-mail para confirmar.</p>
    <div id="form">
      <label>Nome <span class="opc">(opcional)</span></label>
      <input class="campo" type="text" id="nome" placeholder="Seu nome" autocomplete="name">
      <label>E-mail</label>
      <input class="campo" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      <label>Telefone <span class="opc">(opcional)</span></label>
      <input class="campo" type="tel" id="fone" placeholder="(00) 00000-0000" autocomplete="tel">
      <button class="btn" id="btn">Quero me inscrever</button>
      <div class="msg" id="msg" role="status"></div>
    </div>
    <p class="lgpd">Ao se inscrever, você concorda em receber e-mails da Up Dance. Pode cancelar quando quiser.</p>
    <a class="voltar" href="/">← Voltar ao blog</a>
  </div>
<script>
  var intro=document.getElementById('intro'),form=document.getElementById('form'),
      msg=document.getElementById('msg'),btn=document.getElementById('btn'),email=document.getElementById('email');
  var st=new URLSearchParams(location.search).get('status');
  if(st==='confirmado'){form.style.display='none';intro.innerHTML='✓ Inscrição confirmada! Obrigado.';intro.style.color='#5fe0a4';}
  else if(st==='invalido'){msg.className='msg err';msg.textContent='Link inválido ou já utilizado. Tente de novo.';}
  btn.addEventListener('click',function(){
    msg.className='msg';msg.textContent='';btn.disabled=true;
    fetch('/api/newsletter/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email.value.trim(),name:document.getElementById('nome').value.trim(),phone:document.getElementById('fone').value.trim()})})
      .then(r=>r.json()).then(d=>{
        if(d.ok&&d.jaInscrito){msg.className='msg ok';msg.textContent='Este e-mail já está inscrito. 🎉';}
        else if(d.ok){form.style.display='none';intro.innerHTML='Quase lá! Enviamos um e-mail de confirmação para <b>'+email.value.trim()+'</b>.';}
        else{msg.className='msg err';msg.textContent=d.erro||'Não foi possível concluir.';}
      }).catch(()=>{msg.className='msg err';msg.textContent='Falha de conexão.';}).finally(()=>btn.disabled=false);
  });
</script>
</body>
</html>
