<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newsletter — Up Dance</title>
<link rel="icon" type="image/x-icon" href="/images/icons/udx-icon.ico">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:ital@1&display=swap">
<!-- Material Design Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@6.9.96/css/materialdesignicons.min.css">
<style>
  :root{--bg:#020118;--card:#0c0b22;--line:#221f3e;--txt:#DFE0F2;--muted:#8a86b0;--accent:#BF0449;--grad:linear-gradient(to right,#F434A1,#ff8442)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Poppins',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:2rem 1.2rem}
  .card{width:min(94vw,440px);background:var(--card);border:1px solid var(--line);border-radius:18px;padding:2.4rem 2rem;text-align:center}
  .logo{width:54px;height:54px;border-radius:25%}
  h1{margin:1rem 0 .3rem;font-size:1.5rem;font-weight:700;color:#fff}
  h1 span{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
    background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .intro{color:var(--muted);line-height:1.55;font-size:.92rem;margin:0 0 1.6rem}
  label{display:block;font-size:.76rem;color:var(--muted);margin:.2rem 0 .35rem;text-align:left}
  .opc{font-size:.7rem}
  /* wrapper de campo (ícone à esquerda) */
.campo{position:relative;margin:0 0 .8rem;text-align:left;transition:margin .2s}
.campo > .mdi{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:1.05rem;transition:color .2s;pointer-events:none}

.inp{width:100%;padding:.8rem .9rem;border-radius:9px;border:1px solid #2f2c52;background:var(--bg);
  color:#fff;font-size:.95rem;font-family:'Poppins',sans-serif;transition:border-color .2s}
.inp:focus{outline:none;border-color:var(--accent)}
.inp::placeholder{color:#6f6c94}
.campo.tem-icone .inp{padding-left:2.5rem}

/* estados de validação */
.campo.is-ok  .inp{border-color:#5fe0a4}
.campo.is-ok  > .mdi{color:#5fe0a4}
.campo.is-err .inp{border-color:#ff7591}
.campo.is-err > .mdi{color:#ff7591}

/* dica em tempo real (abaixo do e-mail) */
.dica{display:flex;align-items:center;gap:.4rem;margin:-.4rem 0 .8rem;
  font-size:.78rem;color:var(--muted);min-height:1.05em;transition:color .2s;text-align:left}
.dica .mdi{font-size:.95rem}
.dica.is-ok{color:#5fe0a4}
.dica.is-err{color:#ff7591}

.btn{width:100%;padding:.85rem;border-radius:9px;border:0;cursor:pointer;background:var(--accent);
  color:#fff;font-weight:600;font-size:.98rem;font-family:'Poppins',sans-serif;
  transition:background-image .25s,opacity .2s}
.btn:hover:not(:disabled){background-image:var(--grad)}
.btn:disabled{opacity:.5;cursor:not-allowed;background-image:none}
  .msg{margin-top:1rem;font-size:.88rem;min-height:1.1em;line-height:1.45}.msg.ok{color:#5fe0a4}.msg.err{color:#ff7591}
  .voltar{display:inline-block;margin-top:1.6rem;color:var(--muted);font-size:.85rem;text-decoration:none}
  .lgpd{margin-top:1.2rem;font-size:.74rem;color:#6f6c94;line-height:1.5}
  @media(max-width:420px){.card{padding:1.8rem 1.2rem}}
</style>
</head>
<body>
    <script src="/js/loader.js"></script>
  <div class="card">
    <img class="logo" src="/images/icons/udx-icon.png" alt="Up Dance">
    <h1>Cadastre-se na <span>Up Dance</span></h1>
    <p class="intro" id="intro">Receba nossa Newsletter com matérias exclusivas. Enviaremos um e-mail para confirmar.</p>
    <div id="form">
      <label for="nome">Nome <span class="opc">(opcional)</span></label>
      <div class="campo tem-icone">
        <span class="mdi mdi-account-outline" aria-hidden="true"></span>
        <input class="inp" type="text" id="nome" placeholder="Seu nome" autocomplete="name">
      </div>

      <label for="email">E-mail</label>
      <div class="campo tem-icone" id="campoEmail">
        <span class="mdi mdi-email-outline" aria-hidden="true"></span>
        <input class="inp" type="email" id="email" placeholder="seu@email.com" autocomplete="email" aria-describedby="dicaEmail">
      </div>
      <p class="dica" id="dicaEmail" role="status" aria-live="polite"></p>

      <label for="fone">Telefone <span class="opc">(opcional)</span></label>
      <div class="campo tem-icone" id="campoFone">
        <span class="mdi mdi-phone-outline" aria-hidden="true"></span>
        <input class="inp" type="tel" id="fone" placeholder="(00) 00000-0000" autocomplete="tel">
      </div>

      <button class="btn" id="btn" disabled>Quero me inscrever</button>
      <div class="msg" id="msg" role="status" aria-live="polite"></div>
    </div>
    <p class="lgpd">Ao se inscrever, você concorda em receber e-mails da Up Dance. Pode cancelar quando quiser.</p>
    <a class="voltar" href="/">← Voltar ao blog</a>
  </div>
<script>
 (function(){
  var intro   = document.getElementById('intro');
  var form    = document.getElementById('form');
  var msg     = document.getElementById('msg');
  var btn     = document.getElementById('btn');
  var nome    = document.getElementById('nome');
  var email   = document.getElementById('email');
  var fone    = document.getElementById('fone');
  var cEmail  = document.getElementById('campoEmail');
  var cFone   = document.getElementById('campoFone');
  var dicaEm  = document.getElementById('dicaEmail');

  function setMsg(cls, txt){ msg.className = 'msg' + (cls ? ' ' + cls : ''); msg.textContent = txt || ''; }
  function setDica(el, txt, tipo, icone){
    el.className = 'dica' + (tipo ? ' ' + tipo : '');
    el.innerHTML = txt ? '<span class="mdi ' + (icone || 'mdi-information-outline') + '"></span>' + txt : '';
  }
  function setEstado(campo, estado){
    if (!campo) return;
    campo.classList.remove('is-ok','is-err');
    if (estado) campo.classList.add('is-' + estado);
  }
  function emailValido(e){ return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e); }
  function telValido(t){    // só valida se preenchido; aceita 10 ou 11 dígitos (BR)
    var digitos = t.replace(/\D/g, '');
    return digitos.length === 0 || digitos.length === 10 || digitos.length === 11;
  }

  /* ------- máscara leve de telefone BR ------- */
  fone.addEventListener('input', function(){
    var d = fone.value.replace(/\D/g, '').slice(0, 11);
    if (d.length === 0)      fone.value = '';
    else if (d.length <= 2)  fone.value = '(' + d;
    else if (d.length <= 6)  fone.value = '(' + d.slice(0,2) + ') ' + d.slice(2);
    else if (d.length <= 10) fone.value = '(' + d.slice(0,2) + ') ' + d.slice(2,6) + '-' + d.slice(6);
    else                     fone.value = '(' + d.slice(0,2) + ') ' + d.slice(2,7) + '-' + d.slice(7);
    verificar();
  });

  /* ------- validação em tempo real ------- */
  function verificar(){
    var e = email.value.trim();
    var t = fone.value.trim();

    // e-mail
    if (!e) {
      setEstado(cEmail, '');
      setDica(dicaEm, '', '');
    } else if (emailValido(e)) {
      setEstado(cEmail, 'ok');
      setDica(dicaEm, 'E-mail válido.', 'ok', 'mdi-check-circle-outline');
    } else {
      setEstado(cEmail, 'err');
      setDica(dicaEm, 'Informe um e-mail válido.', 'err', 'mdi-close-circle-outline');
    }

    // telefone (opcional): só sinaliza erro se preenchido e curto demais
    setEstado(cFone, !t ? '' : (telValido(t) ? 'ok' : 'err'));

    btn.disabled = !(emailValido(e) && telValido(t));
  }
  email.addEventListener('input', verificar);
  nome .addEventListener('input', verificar); // reavalia (não altera estado, mas mantém consistência)

  // Enter avança / submete
  nome .addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); email.focus(); } });
  email.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); fone.focus();  } });
  fone .addEventListener('keydown', function(e){ if (e.key === 'Enter' && !btn.disabled) btn.click(); });

  /* ------- prefill via ?email=... e mensagens de status ------- */
  var params = new URLSearchParams(location.search);
  var st = params.get('status');
  var emailParam = (params.get('email') || '').trim();
  if (emailParam) { email.value = emailParam; }

  if (st === 'confirmado') {
    form.style.display = 'none';
    intro.innerHTML = '✓ Inscrição confirmada! Obrigado.';
    intro.style.color = '#5fe0a4';
  } else if (st === 'invalido') {
    setMsg('err', 'Link inválido ou já utilizado. Tente de novo.');
  }

  /* ------- envio ------- */
  btn.addEventListener('click', function(){
    setMsg('','');
    btn.disabled = true;

    fetch('/api/newsletter/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: email.value.trim(),
        name:  nome.value.trim(),
        phone: fone.value.trim()
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok && d.jaInscrito) {
        setMsg('ok','Este e-mail já está inscrito. 🎉');
        verificar();
      } else if (d.ok) {
        form.style.display = 'none';
        intro.innerHTML = 'Quase lá! Enviamos um e-mail de confirmação para <b>' + email.value.trim() + '</b>.';
      } else {
        setMsg('err', d.erro || 'Não foi possível concluir.');
        verificar();
      }
    })
    .catch(function(){ setMsg('err','Falha de conexão.'); verificar(); });
  });

  /* estado inicial (importante quando vem prefill por ?email=) */
  verificar();
})();
</script>
</body>
</html>
