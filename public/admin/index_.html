<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Up Dance</title>
  <link rel="icon" type="image/x-icon" href="/images/icons/udx-icon.ico">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:ital@1&display=swap">
  <style>
    :root{
      --bg:#020118; --card:#0c0b22; --panel:#0a0820; --line:#221f3e;
      --txt:#DFE0F2; --muted:#8a86b0; --accent:#BF0449; --accent2:#eb2f5b;
      --ok:#5fe0a4; --err:#ff7591; --pend:#ffb347;
      --grad:linear-gradient(to right,#F434A1 0%,#ff8442 100%);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--txt);
      font-family:'Poppins',sans-serif}
    .topo{display:flex;align-items:center;gap:.7rem;padding:1rem 1.4rem;
      border-bottom:1px solid var(--line)}
    .topo img{width:34px;height:34px}
    .topo .marca{font-family:'Playfair Display',serif;font-style:italic;font-size:1.25rem;
      background:linear-gradient(to top,#fb8460,#f13aa1);-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text}
    .topo .tag{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
      border:1px solid var(--line);padding:.2rem .5rem;border-radius:6px}
    .sair{margin-left:auto;color:var(--muted);text-decoration:none;font-size:.85rem;
      border:1px solid var(--line);padding:.4rem .9rem;border-radius:9px}
    .sair:hover{color:#fff;border-color:var(--accent2)}
    .wrap{max-width:1000px;margin:0 auto;padding:1.8rem 1.4rem 3rem}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:1.1rem 1.2rem;border-left:4px solid var(--accent)}
    .stat .n{font-size:1.7rem;font-weight:700;color:#fff;line-height:1}
    .stat .l{font-size:.78rem;color:var(--muted);margin-top:.35rem}
    h2{font-size:1.05rem;font-weight:600;color:#fff;margin:1.8rem 0 .9rem}
    .box{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{text-align:left;padding:.7rem .9rem;color:var(--muted);font-weight:600;
      border-bottom:1px solid var(--line);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em}
    td{padding:.7rem .9rem;border-bottom:1px solid var(--panel);color:var(--txt)}
    tr:last-child td{border-bottom:none}
    .pill{font-size:.72rem;padding:.18rem .55rem;border-radius:999px;font-weight:600;display:inline-block}
    .pill.confirmed{background:rgba(95,224,164,.14);color:var(--ok)}
    .pill.pending{background:rgba(255,179,71,.14);color:var(--pend)}
    .pill.unsubscribed{background:rgba(255,117,145,.14);color:var(--err)}
    .ev-type{color:#cfd0ea;font-weight:500}
    .ev-erro{color:var(--err)}
    .ev-ok{color:var(--ok)}
    .muted{color:var(--muted)}
    .vazio{padding:1.4rem;color:var(--muted);font-size:.88rem;text-align:center}
    .erro-load{padding:2rem;text-align:center;color:var(--err)}
    @media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header class="topo">
    <img src="/images/icons/udx-icon.png" alt="">
    <span class="marca">Up Dance</span>
    <span class="tag">Admin</span>
    <a class="sair" href="/api/auth/logout">Sair</a>
  </header>

  <div class="wrap" id="wrap">
    <div class="erro-load" id="loading">Carregando dados…</div>
  </div>

  <script>
    function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function quando(iso){ if(!iso) return '—'; var d=new Date(iso);
      return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }

    fetch('/api/admin/data')
      .then(function(r){ if(!r.ok) throw new Error(r.status===403?'acesso negado':'erro '+r.status); return r.json(); })
      .then(render)
      .catch(function(e){
        document.getElementById('loading').textContent =
          e.message==='acesso negado'
            ? 'Acesso negado. Esta área é restrita a administradores.'
            : 'Não foi possível carregar os dados ('+e.message+').';
      });

    function render(d){
      var s = d.stats || {};
      var subs = d.subscribers || [];
      var evs = d.events || [];

      var html = '';
      html += '<div class="stats">' +
        card(s.total, 'Inscritos (total)') +
        card(s.confirmados, 'Confirmados') +
        card(s.pendentes, 'Pendentes') +
        card(s.erros, 'Erros de e-mail') + '</div>';

      html += '<h2>Inscritos</h2><div class="box">';
      if(!subs.length){ html += '<div class="vazio">Nenhum inscrito ainda.</div>'; }
      else {
        html += '<table><thead><tr><th>E-mail</th><th>Nome</th><th>Status</th>' +
                '<th>Cadastro</th><th>Confirmado</th></tr></thead><tbody>';
        subs.forEach(function(x){
          html += '<tr><td>'+esc(x.email)+'</td><td>'+(esc(x.name)||'<span class="muted">—</span>')+'</td>' +
            '<td><span class="pill '+esc(x.status)+'">'+esc(x.status)+'</span></td>' +
            '<td class="muted">'+quando(x.created_at)+'</td>' +
            '<td class="muted">'+quando(x.confirmed_at)+'</td></tr>';
        });
        html += '</tbody></table>';
      }
      html += '</div>';

      html += '<h2>Eventos recentes</h2><div class="box">';
      if(!evs.length){ html += '<div class="vazio">Nenhum evento registrado.</div>'; }
      else {
        html += '<table><thead><tr><th>Quando</th><th>Evento</th><th>E-mail</th><th>Detalhe</th></tr></thead><tbody>';
        evs.forEach(function(e){
          var cls = e.type.indexOf('erro')>-1 ? 'ev-erro' : (e.type.indexOf('ok')>-1||e.type.indexOf('confirmado')>-1 ? 'ev-ok' : 'ev-type');
          html += '<tr><td class="muted">'+quando(e.created_at)+'</td>' +
            '<td class="'+cls+'">'+esc(e.type)+'</td>' +
            '<td>'+(esc(e.email)||'<span class="muted">—</span>')+'</td>' +
            '<td class="muted">'+(esc(e.detail)||'—')+'</td></tr>';
        });
        html += '</tbody></table>';
      }
      html += '</div>';

      document.getElementById('wrap').innerHTML = html;
    }

    function card(n, label){
      return '<div class="stat"><div class="n">'+(n==null?0:n)+'</div><div class="l">'+label+'</div></div>';
    }
  </script>
</body>
</html>
