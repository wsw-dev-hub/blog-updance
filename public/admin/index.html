<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Painel</title>
<link rel="icon" type="image/x-icon" href="/images/icons/udx-icon.ico">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:ital@1&display=swap">
<style>
  :root{
    --bg:#020118; --card:#0c0b22; --card-2:#0f0e2a; --line:#221f3e; --line-soft:#1a1834;
    --txt:#DFE0F2; --muted:#8a86b0; --faint:#6f6c94;
    --accent:#BF0449; --grad:linear-gradient(to right,#F434A1,#ff8442);
    --ok:#5fe0a4; --warn:#ffce6a; --err:#ff7591;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:'Poppins',sans-serif;font-size:14px;line-height:1.5;
    padding:1.5rem;max-width:1180px;margin:0 auto;
  }
  a{color:inherit}

  /* ── Cabeçalho ── */
  .topbar{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:1.6rem}
  .topbar img{width:34px;height:34px}
  .marca{font-family:'Playfair Display',serif;font-style:italic;font-size:1.35rem;
    background:linear-gradient(to top,#fb8460,#f13aa1);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text}
  .tag{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);padding:.16rem .5rem;border-radius:6px}
  .spacer{flex:1}
  .ghost-btn{background:transparent;border:1px solid var(--line);color:var(--muted);
    font-family:'Poppins',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;
    padding:.5rem .9rem;border-radius:8px;transition:.2s}
  .ghost-btn:hover{border-color:var(--accent);color:#fff}
  .ghost-btn:disabled{opacity:.5;cursor:default}

  /* ── Cartões de estatística ── */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.8rem;margin-bottom:1.6rem}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.05rem 1.15rem}
  .stat .n{font-size:1.9rem;font-weight:700;line-height:1;letter-spacing:-.02em}
  .stat .l{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.5rem}
  .stat.accent .n{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .stat.danger .n{color:var(--err)}

  /* ── Abas ── */
  .tabs{display:flex;gap:.4rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem;flex-wrap:wrap}
  .tab{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--muted);
    font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;
    padding:.6rem .9rem;margin-bottom:-1px;transition:.2s}
  .tab:hover{color:var(--txt)}
  .tab.active{color:#fff;border-bottom-color:var(--accent)}
  .tab .count{font-size:.72rem;color:var(--faint);margin-left:.35rem}

  /* ── Tabelas ── */
  .panel{display:none}
  .panel.active{display:block}
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--card)}
  table{width:100%;border-collapse:collapse;min-width:560px}
  thead th{font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
    text-align:left;font-weight:600;padding:.8rem 1rem;border-bottom:1px solid var(--line);white-space:nowrap}
  tbody td{padding:.78rem 1rem;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--card-2)}
  td.email{font-weight:500;color:#fff}
  td.dim{color:var(--muted)}
  td.mono{font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--muted);font-size:.82rem}

  .badge{display:inline-block;font-size:.68rem;font-weight:600;letter-spacing:.03em;
    padding:.2rem .55rem;border-radius:999px;border:1px solid transparent;white-space:nowrap}
  .badge.ok{color:var(--ok);border-color:rgba(95,224,164,.35);background:rgba(95,224,164,.08)}
  .badge.pending{color:var(--warn);border-color:rgba(255,206,106,.35);background:rgba(255,206,106,.08)}
  .badge.err{color:var(--err);border-color:rgba(255,117,145,.35);background:rgba(255,117,145,.08)}
  .badge.neutral{color:var(--muted);border-color:var(--line)}

  /* select de tipo do membro (edição inline) */
  .type-sel{background:var(--bg);color:#fff;border:1px solid var(--line);border-radius:8px;
    padding:.3rem .5rem;font:inherit;font-size:.8rem;cursor:pointer;transition:border-color .2s}
  .type-sel:hover{border-color:var(--muted)}
  .type-sel:focus{outline:none;border-color:var(--accent)}
  .type-sel.saving{opacity:.6;pointer-events:none}
  .type-sel.ok{border-color:var(--ok)}
  .type-sel.err{border-color:var(--err)}

  /* ── Estados ── */
  .state{padding:3rem 1.2rem;text-align:center;color:var(--muted);font-size:.9rem}
  .state.err{color:var(--err)}
  .empty{padding:2.4rem 1.2rem;text-align:center;color:var(--faint);font-size:.86rem}
  .updated{color:var(--faint);font-size:.74rem;margin-top:1rem;text-align:right}

  @media (max-width:560px){
    body{padding:1rem}
    .stat .n{font-size:1.55rem}
  }
</style>
</head>
<body>
    <script src="/js/loader.js"></script>
  <header class="topbar">
    <img src="/images/icons/udx-icon.png" alt="">
    <span class="marca">Up Dance</span>
    <span class="tag">Admin</span>
    <span class="spacer"></span>
    <button class="ghost-btn" id="refresh">Atualizar</button>
    <button class="ghost-btn" id="logout">Sair</button>
  </header>

  <main id="root">
    <div class="state" id="loading">Carregando dados…</div>
    <div id="content" hidden>
      <section class="stats" id="stats"></section>

      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="members">Membros<span class="count" id="c-members"></span></button>
        <button class="tab" data-tab="subscribers">Inscritos<span class="count" id="c-subscribers"></span></button>
        <button class="tab" data-tab="access">Acessos<span class="count" id="c-access"></span></button>
        <button class="tab" data-tab="events">Eventos<span class="count" id="c-events"></span></button>
      </nav>

      <section class="panel active" id="panel-members"></section>
      <section class="panel" id="panel-subscribers"></section>
      <section class="panel" id="panel-access"></section>
      <section class="panel" id="panel-events"></section>

      <p class="updated" id="updated"></p>
    </div>
  </main>

<script>
  "use strict";

  /* ── helpers ── */
  function esc(v){
    if(v===null||v===undefined||v==="") return "";
    return String(v).replace(/[&<>"']/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }
  function fmtDate(v){
    if(!v) return "—";
    var d=new Date(v);
    if(isNaN(d)) return esc(v);
    return d.toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  }
  function statusBadge(s){
    var v=(s||"").toLowerCase(), cls="neutral", label=s||"—";
    if(v==="active"||v==="confirmed"){cls="ok";label=v==="active"?"ativo":"confirmado";}
    else if(v==="pending"){cls="pending";label="pendente";}
    return '<span class="badge '+cls+'">'+esc(label)+'</span>';
  }
  function eventBadge(type){
    var t=(type||"").toLowerCase(), cls="neutral";
    if(t.indexOf("_erro")>-1) cls="err";
    else if(t.indexOf("login")>-1||t.indexOf("confirmado")>-1||t.indexOf("_ok")>-1) cls="ok";
    else if(t.indexOf("pendente")>-1||t.indexOf("enviado")>-1) cls="pending";
    return '<span class="badge '+cls+'">'+esc(type||"—")+'</span>';
  }
  function el(id){return document.getElementById(id);}

  /* ── tabela genérica de pessoas (membros / inscritos) ── */
  function peopleTable(rows){
    if(!rows||!rows.length) return '<div class="empty">Nenhum registro ainda.</div>';
    var body=rows.map(function(r){
      return '<tr>'+
        '<td class="email">'+esc(r.email)+'</td>'+
        '<td class="dim">'+(esc(r.name)||"—")+'</td>'+
        '<td class="dim">'+(esc(r.phone)||"—")+'</td>'+
        '<td>'+statusBadge(r.status)+'</td>'+
        '<td class="mono">'+fmtDate(r.created_at)+'</td>'+
        '<td class="mono">'+fmtDate(r.confirmed_at)+'</td>'+
      '</tr>';
    }).join("");
    return '<div class="table-wrap"><table>'+
      '<thead><tr><th>E-mail</th><th>Nome</th><th>Telefone</th><th>Status</th><th>Criado em</th><th>Confirmado em</th></tr></thead>'+
      '<tbody>'+body+'</tbody></table></div>';
  }

  /* ── tabela de membros (com coluna Tipo editável) ── */
  function typeSelect(email, atual, types){
    var opts=(types||[]).map(function(t){
      var sel=(t===atual)?' selected':'';
      return '<option value="'+esc(t)+'"'+sel+'>'+esc(t)+'</option>';
    }).join("");
    return '<select class="type-sel" data-email="'+esc(email)+'" data-atual="'+esc(atual||"")+'" title="Alterar tipo">'+opts+'</select>';
  }

  function membersTable(rows, types){
    if(!rows||!rows.length) return '<div class="empty">Nenhum membro ainda.</div>';
    var body=rows.map(function(r){
      return '<tr>'+
        '<td class="email">'+esc(r.email)+'</td>'+
        '<td class="dim">'+(esc(r.name)||"—")+'</td>'+
        '<td class="dim">'+(esc(r.phone)||"—")+'</td>'+
        '<td>'+statusBadge(r.status)+'</td>'+
        '<td>'+typeSelect(r.email, r.type, types)+'</td>'+
        '<td class="mono">'+fmtDate(r.created_at)+'</td>'+
        '<td class="mono">'+fmtDate(r.confirmed_at)+'</td>'+
      '</tr>';
    }).join("");
    return '<div class="table-wrap"><table>'+
      '<thead><tr><th>E-mail</th><th>Nome</th><th>Telefone</th><th>Status</th><th>Tipo</th><th>Criado em</th><th>Confirmado em</th></tr></thead>'+
      '<tbody>'+body+'</tbody></table></div>';
  }

  function bindTypeSelects(container){
    container.querySelectorAll(".type-sel").forEach(function(sel){
      sel.addEventListener("change", function(){
        var email=sel.dataset.email, novo=sel.value, anterior=sel.dataset.atual;
        if(novo===anterior) return;
        sel.classList.remove("ok","err");
        sel.classList.add("saving");
        fetch("/api/admin/member/update-type",{
          method:"POST", credentials:"same-origin",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ email: email, type: novo })
        })
        .then(function(r){ return r.json(); })
        .then(function(d){
          sel.classList.remove("saving");
          if(d && d.ok){
            sel.dataset.atual = d.type;
            sel.classList.add("ok");
            setTimeout(function(){ sel.classList.remove("ok"); }, 1400);
          } else {
            sel.value = anterior; // reverte
            sel.classList.add("err");
            alert((d && d.erro) || "Falha ao atualizar o tipo.");
          }
        })
        .catch(function(){
          sel.classList.remove("saving");
          sel.value = anterior;
          sel.classList.add("err");
          alert("Falha de conexão.");
        });
      });
    });
  }

  /* ── tabela de eventos ── */
  function accessTable(resources, types){
  if(!resources||!resources.length){
    return '<div class="empty">Nenhum recurso cadastrado. Use o formulário abaixo para criar o primeiro.</div>' + resourceFormHtml();
  }
  var head = '<th>Recurso</th><th>Prefixo</th>' + types.map(function(t){
    return '<th style="text-align:center">'+esc(t)+'</th>';
  }).join('') + '<th style="text-align:center">Editar</th>';
  var body = resources.map(function(r){
    var allowed = new Set(r.allowed || []);
    var cells = types.map(function(t){
      var checked = allowed.has(t) ? ' checked' : '';
      return '<td style="text-align:center">'+
        '<input type="checkbox" class="acc-chk" data-key="'+esc(r.key)+'" data-type="'+esc(t)+'"'+checked+'></td>';
    }).join('');
    // guarda os campos editáveis em data-attrs — o botão Editar preenche o form
    var editBtn = '<button class="ghost-btn acc-edit" '+
      'data-key="'+esc(r.key)+'" '+
      'data-label="'+esc(r.label||'')+'" '+
      'data-prefix="'+esc(r.path_prefix||'')+'" '+
      'data-icon="'+esc(r.icon||'')+'" '+
      'data-description="'+esc(r.description||'')+'" '+
      'title="Editar recurso">✎</button>';
    var iconoTag = r.icon ? '<span class="mdi mdi-'+esc(r.icon)+'" style="margin-right:6px;color:var(--accent)"></span>' : '';
    return '<tr>'+
      '<td class="email">'+iconoTag+esc(r.label)+
        '<div class="dim" style="font-size:.72rem">'+esc(r.key)+'</div>'+
        (r.description ? '<div class="dim" style="font-size:.72rem;margin-top:2px">'+esc(r.description)+'</div>' : '')+
      '</td>'+
      '<td class="dim mono">'+(esc(r.path_prefix)||'—')+'</td>'+
      cells +
      '<td style="text-align:center">'+editBtn+'</td>'+
    '</tr>';
  }).join('');
  return '<div class="table-wrap"><table>'+
    '<thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<p class="updated">Marque os tipos que podem acessar cada recurso. As mudanças são salvas ao clicar em <b>Salvar acessos</b>.</p>'+
    '<button class="ghost-btn" id="btnSaveAccess">Salvar acessos</button>'+
    resourceFormHtml();
}

function resourceFormHtml(){
  return ''+
  '<section style="margin-top:2rem;padding:1.2rem;border:1px solid var(--line);border-radius:12px;background:var(--card)">'+
    '<h3 style="margin:0 0 .8rem;color:#fff;font-size:1rem">Novo / editar recurso</h3>'+
    '<div style="display:grid;gap:.6rem;grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">'+
      '<label style="display:block"><span class="dim" style="font-size:.72rem">Chave (a-z 0-9 hífen)</span>'+
        '<input id="resKey" class="type-sel" style="width:100%" placeholder="ex.: area-premium" autocomplete="off"></label>'+
      '<label style="display:block"><span class="dim" style="font-size:.72rem">Rótulo</span>'+
        '<input id="resLabel" class="type-sel" style="width:100%" placeholder="ex.: Área Premium"></label>'+
      '<label style="display:block"><span class="dim" style="font-size:.72rem">Prefixo (opcional)</span>'+
        '<input id="resPrefix" class="type-sel" style="width:100%" placeholder="/membros/premium/"></label>'+
      '<label style="display:block"><span class="dim" style="font-size:.72rem">Ícone MDI (sem prefixo)</span>'+
        '<input id="resIcon" class="type-sel" style="width:100%" placeholder="ex.: shield-star" autocomplete="off"></label>'+
    '</div>'+
    '<label style="display:block;margin-top:.6rem"><span class="dim" style="font-size:.72rem">Descrição</span>'+
      '<textarea id="resDesc" class="type-sel" style="width:100%;min-height:60px" '+
      'placeholder="Descrição curta que aparece no card do membro."></textarea></label>'+
    '<div style="margin-top:.8rem;display:flex;gap:.6rem;flex-wrap:wrap">'+
      '<button class="ghost-btn" id="btnSaveResource">Salvar recurso</button>'+
      '<button class="ghost-btn" id="btnClearResource">Limpar</button>'+
      '<span id="resMsg" class="dim" style="font-size:.8rem;align-self:center"></span>'+
    '</div>'+
    '<p class="dim" style="font-size:.72rem;margin-top:.6rem">'+
      'Salvar cria um recurso novo ou atualiza um existente com a mesma chave. '+
      'Ícones: consulte <a href="https://pictogrammers.com/library/mdi/" target="_blank" style="color:var(--accent)">pictogrammers.com/library/mdi</a> — use apenas o nome (ex.: <code>star-four-points-outline</code>).'+
    '</p>'+
  '</section>';
}

  function loadAccess(){
  el("panel-access").innerHTML = '<div class="empty">Carregando…</div>';
  fetch("/api/admin/access/list",{credentials:"same-origin"})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d || !d.ok){ el("panel-access").innerHTML='<div class="empty">Falha ao carregar.</div>'; return; }
      el("c-access").textContent = "("+(d.resources||[]).length+")";
      el("panel-access").innerHTML = accessTable(d.resources, d.memberTypes);

      var btn = document.getElementById("btnSaveAccess");
      if (btn) btn.addEventListener("click", function(){ saveAccess(d.resources.map(function(r){return r.key;})); });

      // Editar: pré-preenche o form a partir dos data-attrs
      document.querySelectorAll(".acc-edit").forEach(function(b){
        b.addEventListener("click", function(){
          document.getElementById("resKey").value    = b.dataset.key         || "";
          document.getElementById("resLabel").value  = b.dataset.label       || "";
          document.getElementById("resPrefix").value = b.dataset.prefix      || "";
          document.getElementById("resIcon").value   = b.dataset.icon        || "";
          document.getElementById("resDesc").value   = b.dataset.description || "";
          document.getElementById("resKey").focus();
        });
      });

      // Salvar recurso (novo ou existente)
      var btnSave = document.getElementById("btnSaveResource");
      if (btnSave) btnSave.addEventListener("click", function(){ saveResource(); });

      var btnClear = document.getElementById("btnClearResource");
      if (btnClear) btnClear.addEventListener("click", function(){
        ["resKey","resLabel","resPrefix","resIcon","resDesc"].forEach(function(id){
          document.getElementById(id).value = "";
        });
        document.getElementById("resMsg").textContent = "";
      });
    })
    .catch(function(){ el("panel-access").innerHTML='<div class="empty">Falha de conexão.</div>'; });
}

function saveResource(){
  var body = {
    key:         document.getElementById("resKey").value,
    label:       document.getElementById("resLabel").value,
    path_prefix: document.getElementById("resPrefix").value,
    icon:        document.getElementById("resIcon").value,
    description: document.getElementById("resDesc").value,
  };
  var msg = document.getElementById("resMsg");
  msg.textContent = "Salvando…";
  fetch("/api/admin/resources/save",{
    method:"POST", credentials:"same-origin",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d && d.ok){
      msg.textContent = "Salvo. Recarregando…";
      accessLoaded = false;
      loadAccess();
    } else {
      msg.textContent = (d && d.erro) || "Falha ao salvar.";
    }
  })
  .catch(function(){ msg.textContent = "Falha de conexão."; });
}

  function saveAccess(keys){
    // agrupa checkboxes por recurso e envia um POST por recurso
    var byKey = {};
    document.querySelectorAll(".acc-chk").forEach(function(c){
      if(c.checked) (byKey[c.dataset.key] = byKey[c.dataset.key] || []).push(c.dataset.type);
    });
    var tasks = keys.map(function(k){
      return fetch("/api/admin/access/save",{
        method:"POST", credentials:"same-origin",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ resource_key:k, types: byKey[k] || [] })
      }).then(function(r){ return r.json(); });
    });
    Promise.all(tasks).then(function(results){
      var falhas = results.filter(function(x){ return !x || !x.ok; });
      alert(falhas.length ? "Algumas alterações falharam." : "Acessos salvos.");
    });
  }

  function eventsTable(rows){
    if(!rows||!rows.length) return '<div class="empty">Nenhum evento registrado.</div>';
    var body=rows.map(function(r){
      return '<tr>'+
        '<td>'+eventBadge(r.type)+'</td>'+
        '<td class="email">'+(esc(r.email)||"—")+'</td>'+
        '<td class="dim">'+(esc(r.detail)||"—")+'</td>'+
        '<td class="mono">'+fmtDate(r.created_at)+'</td>'+
      '</tr>';
    }).join("");
    return '<div class="table-wrap"><table>'+
      '<thead><tr><th>Tipo</th><th>E-mail</th><th>Detalhe</th><th>Quando</th></tr></thead>'+
      '<tbody>'+body+'</tbody></table></div>';
  }

  /* ── cartões de estatística ── */
  function renderStats(s){
    s=s||{};
    var cards=[
      {n:s.membros,          l:"Membros",            cls:""},
      {n:s.membros_ativos,   l:"Membros ativos",     cls:"accent"},
      {n:s.news_confirmados, l:"Newsletter conf.",   cls:""},
      {n:s.erros,            l:"Erros registrados",  cls:"danger"}
    ];
    el("stats").innerHTML=cards.map(function(c){
      return '<div class="stat '+c.cls+'"><div class="n">'+(c.n==null?0:c.n)+'</div><div class="l">'+c.l+'</div></div>';
    }).join("");
  }

  /* ── abas ── */
  /* DEPOIS */
var eventsLoaded = false;
var accessLoaded = false;
function setupTabs(){
  var tabs=document.querySelectorAll(".tab");
  tabs.forEach(function(t){
    t.addEventListener("click",function(){
      tabs.forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("active");});
      t.classList.add("active");
      el("panel-"+t.dataset.tab).classList.add("active");

      // lazy-load da aba de acessos
      if (t.dataset.tab === "access" && !accessLoaded) {
        accessLoaded = true;
        loadAccess();
      }
      // lazy-load da aba de eventos
      if (t.dataset.tab === "events" && !eventsLoaded) {
        eventsLoaded = true;
        el("panel-events").innerHTML = '<div class="empty">Carregando…</div>';
        fetch("/api/admin/events", { credentials:"same-origin" })
          .then(function(r){ return r.json(); })
          .then(function(d){
            var events = d.events || [];
            el("c-events").textContent = "(" + events.length + ")";
            el("panel-events").innerHTML = eventsTable(events);
          })
          .catch(function(){ eventsLoaded = false; el("panel-events").innerHTML = '<div class="empty">Falha ao carregar.</div>'; });
      }
    });
  });
}

  /* ── carregamento dos dados ── */
  function load(){
    el("loading").className="state";
    el("loading").textContent="Carregando dados…";
    el("loading").hidden=false;
    el("content").hidden=true;

    fetch("/api/admin/data",{credentials:"same-origin",headers:{"Accept":"application/json"}})
      .then(function(r){
        if(r.status===401||r.status===403){ location.href="/admin-login/"; return null; }
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      /* DEPOIS */
      .then(function(d){
        if(!d) return;
        renderStats(d.stats);

        var members=d.members||[], subs=d.subscribers||[];
        el("c-members").textContent="("+members.length+")";
        el("c-subscribers").textContent="("+subs.length+")";
        el("c-events").textContent="";                                         // vazio até o lazy-load

        el("panel-members").innerHTML=membersTable(members, d.memberTypes || []); bindTypeSelects(el("panel-members"));
        el("panel-subscribers").innerHTML=peopleTable(subs);
        el("panel-events").innerHTML='<div class="empty">Clique na aba para carregar.</div>';
        eventsLoaded = false;        
        accessLoaded = false;

        el("c-access").textContent = "";
        el("panel-access").innerHTML = '<div class="empty">Clique na aba para carregar.</div>';                                          // permite recarregar no "Atualizar"

        el("updated").textContent="Atualizado em "+new Date().toLocaleString("pt-BR");
        el("loading").hidden=true;
        el("content").hidden=false;
      })
      .catch(function(err){
        el("loading").className="state err";
        el("loading").textContent="Não foi possível carregar os dados ("+err.message+"). Tente atualizar.";
      });
  }

  /* ── sair ── */
  el("logout").addEventListener("click",function(){
    var b=el("logout"); b.disabled=true;
    fetch("/api/admin/logout",{method:"POST",credentials:"same-origin"})
      .catch(function(){})
      .finally(function(){ location.href="/admin-login/"; });
  });

  el("refresh").addEventListener("click",load);

  setupTabs();
  load();
</script>
</body>
</html>
