	function formatarCronometro(s){
		function duas_casas(numero){
			if(numero <= 9){
				numero = "0"+numero;
			}
			return numero;
		}
		hora = duas_casas(parseInt(s/3600));
		minuto = duas_casas(parseInt((s%3600)/60));
		segundo = duas_casas((s%3600)%60);
		
		hora = hora % 60;
		minuto = minuto % 60;
		segundo = segundo % 60;
		
		if( hora <= 9){ hora = "0" + hora; }
		if( minuto <= 9){ minuto = "0" + minuto; }
		if( segundo <= 9 ){ segundo = "0" + segundo; }
		
		if((hora == 00) || (hora == null) ||(hora == undefined)){
			formatado = " "+minuto+":"+segundo+" ";
		}else{
			formatado = " "+hora+":"+minuto+":"+segundo+" ";
		}
		return formatado;
	}

<script type="text/javascript">
	function verificarTela(screen, window){
		var tela = screen;
		
		if((screen >= 480) && (screen <= 577)){
		if(!$("#screen").hasClass("black")){
				$("#screen").removeClass()
				$("#screen").addClass("black")
				
			}
		if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		
		if((screen >= 576) && (screen <= 768)){
			if(!$("#screen").hasClass("gray")){
				$("#screen").removeClass()
				$("#screen").addClass("gray")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		
		if((screen >= 769) && (screen <= 841)){
			if(!$("#screen").hasClass("red")){
				$("#screen").removeClass()
				$("#screen").addClass("red")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		
		if((screen == 842) && (screen == 991)){
			if(!$("#screen").hasClass("green")){
				$("#screen").removeClass()
				$("#screen").addClass("green")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		
		if((screen >= 992) && (screen <= 1023)){
			if(!$("#screen").hasClass("yellow")){
				$("#screen").removeClass()
				$("#screen").addClass("yellow")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		
		if((screen >= 1024) && (screen <= 1199)){
			if(!$("#screen").hasClass("blue")){
				$("#screen").removeClass()
				$("#screen").addClass("blue")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		if((screen >= 1200)) {
			if(!$("#screen").hasClass("brown")){
				$("#screen").removeClass()
				$("#screen").addClass(".brown")
			}
			if(!$("#window").hasClass("black")){
			$("#window").removeClass()
			$("#window").addClass("black")
			}
		}
		return tela;
	}

</script>
